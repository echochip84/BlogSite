baseURL = 'https://blogsite.echochip.workers.dev/'
locale = 'ko-kr'
title = '홈센스노트'
theme = 'echochip-chirpy-hugo'
enableRobotsTXT = true

[params]
  author = '편집팀'
  description = '집수리·인테리어 전반을 다루는 전문 정보 블로그'
  tagline = '집수리·인테리어<br>판단 기준부터 비용까지'
  favicon = ''
  avatar = ''

  [params.social]
    github = 'https://github.com/echochip84'
    threads = 'https://www.threads.com/@echochip2025'
    email = 'echchip@naver.com'

[pagination]
  pagerSize = 10

[taxonomies]
  category = 'categories'
  tag = 'tags'

[permalinks]
  posts = '/posts/:slug/'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      strikethrough = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
