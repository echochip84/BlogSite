baseURL = 'https://plainpedia.com/tidylab/'
locale = 'ko-kr'
title = '정리수납 연구소'
theme = 'echochip-chirpy-hugo'
enableRobotsTXT = true

[params]
  author = 'echochip'
  description = '좁은 집도 넓게 쓰는 정리·수납 노하우를 공간별로 실험하고 기록하는 정리 연구소입니다.'
  tagline = '정리 수납 미니멀 라이프<br>효율적 공간 활용 꿀팁!'
  favicon = 'images/avatar.jpg'
  avatar = '/images/avatar.jpg'
  # Zero-signup page-view counter (busuanzi.js, third-party free service).
  # Off by default: busuanzi's backend is unreliable and often leaves the
  # count empty ("조회 회"), which looks broken to visitors and reviewers.
  pageviews = false
  # Cloudflare Web Analytics beacon token (dashboard-only stats, nothing
  # shown on the page itself). Get it from the Cloudflare dashboard:
  # Analytics & Logs > Web Analytics > Add a site > copy the token.
  cloudflareAnalyticsToken = 'ddd4626aab654673a622f98fa775c22f'
  googleAnalyticsId = 'G-WJFE0HE868'
  # Google AdSense 계정 연결용 퍼블리셔 ID (도메인 전체 공용 - plainpedia.com 하위
  # 모든 블로그가 동일한 값을 씀). ads.txt는 D:\BlogSite\plainpedia\public\ads.txt에 별도 배치.
  adsensePublisherId = 'pub-9763908781879859'

  [params.social]
    github = 'https://github.com/echochip84'
    threads = 'https://www.threads.com/@echochip2025'
    email = 'echochip@naver.com'

  # Giscus comments (GitHub Discussions-backed). Leave repoId/categoryId
  # empty until Discussions is enabled on the repo and the giscus GitHub
  # App is installed -- comments stay hidden until all four are filled in.
  # Get the exact values from https://giscus.app after that setup.
  [params.giscus]
    repo = 'echochip84/BlogSite'
    repoId = 'R_kgDOTLeYRA'
    category = 'Announcements'
    categoryId = 'DIC_kwDOTLeYRM4DAmIU'
    mapping = 'pathname'
    theme = 'preferred_color_scheme'
    lang = 'ko'

[pagination]
  pagerSize = 10

[taxonomies]
  category = 'categories'
  tag = 'tags'

[permalinks]
  posts = '/posts/:slug/'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      strikethrough = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
